<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cubo Mágico 3D - 3 Faces + Embaralhar</title>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
    }
  }
  </script>

  <style>
    body { margin: 0; background: #111; overflow: hidden; font-family: monospace; }

    #ui {
      position: fixed;
      top: 16px;
      left: 16px;
      display: flex;
      gap: 8px;
    }

    button {
      background: #1a1a2e;
      color: #cdd6f4;
      border: 1px solid #44475a;
      border-radius: 8px;
      padding: 9px 18px;
      font-family: monospace;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover:not(:disabled) { background: #2e2e4a; }
    button:disabled { opacity: 0.35; cursor: not-allowed; }
    
    #btn-shuffle { background: #311b22; border-color: #5a3244; color: #f4cdd6; }
    #btn-shuffle:hover:not(:disabled) { background: #4a2933; }
  </style>
</head>
<body>

<div id="ui">
  <button id="btn-up">↑ Face Superior</button>
  <button id="btn-front">⬤ Face Frontal</button>
  <button id="btn-right">➡ Face Direita</button>
  <button id="btn-shuffle">⟳ Embaralhar</button>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// --- cena, câmera, renderer ---

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111118);

const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 100);
camera.position.set(4, 3, 5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// --- 27 cubinhos ---

const cubelets = [];

for (let x = -1; x <= 1; x++) {
  for (let y = -1; y <= 1; y++) {
    for (let z = -1; z <= 1; z++) {
      const mats = [
        new THREE.MeshBasicMaterial({ color: x ===  1 ? 0x009b48 : 0x111111 }), // +X verde
        new THREE.MeshBasicMaterial({ color: x === -1 ? 0x0046ad : 0x111111 }), // -X azul
        new THREE.MeshBasicMaterial({ color: y ===  1 ? 0xffffff : 0x111111 }), // +Y branco
        new THREE.MeshBasicMaterial({ color: y === -1 ? 0xffd700 : 0x111111 }), // -Y amarelo
        new THREE.MeshBasicMaterial({ color: z ===  1 ? 0xb71234 : 0x111111 }), // +Z vermelho
        new THREE.MeshBasicMaterial({ color: z === -1 ? 0xff5800 : 0x111111 }), // -Z laranja
      ];

      const mesh = new THREE.Mesh(new THREE.BoxGeometry(0.95, 0.95, 0.95), mats);
      mesh.position.set(x, y, z);
      scene.add(mesh);
      cubelets.push(mesh);
    }
  }
}

// --- rotação de face com Group temporário ---

let pivot   = null; 
let rotAxis = null;
let rotDir  = 1;
let rotDone = 0;

const ROT_TOTAL = Math.PI / 2;
let rotSpeed = 4; // rad/s (velocidade normal)

// Variável para controlar a fila de embaralhamento
let movimentosDeEmbaralhar = 0; 

function startRotation(axis, layer, dir) {
  if (pivot) return; // uma rotação por vez

  pivot = new THREE.Group();
  scene.add(pivot);

  cubelets
    .filter(c => Math.round(c.position[axis]) === layer)
    .forEach(c => pivot.add(c));

  rotAxis = axis;
  rotDir  = dir;
  rotDone = 0;

  // Desativa os botões durante a animação
  btns.forEach(b => b.disabled = true);
}

function finishRotation() {
  pivot.rotation[rotAxis] = ROT_TOTAL * rotDir;
  pivot.updateMatrixWorld(true);

  [...pivot.children].forEach(c => {
    c.applyMatrix4(pivot.matrixWorld); 

    c.position.x = Math.round(c.position.x);
    c.position.y = Math.round(c.position.y);
    c.position.z = Math.round(c.position.z);
    c.quaternion.normalize();

    scene.add(c); 
  });

  scene.remove(pivot);
  pivot = null;

  // Lógica do Embaralhamento
  if (movimentosDeEmbaralhar > 0) {
    movimentosDeEmbaralhar--;
    proximoMovimentoEmbaralhar();
  } else {
    rotSpeed = 4; 
    btns.forEach(b => b.disabled = false);
  }
}

// --- Lógica de Embaralhar ---

function iniciarEmbaralhamento() {
  if (pivot) return; 
  movimentosDeEmbaralhar = 15; 
  rotSpeed = 15; 
  proximoMovimentoEmbaralhar();
}

function proximoMovimentoEmbaralhar() {
  const eixos = ['x', 'y', 'z'];
  const camadas = [-1, 1];
  const direcoes = [-1, 1];

  const eixoSorteado = eixos[Math.floor(Math.random() * eixos.length)];
  const camadaSorteada = camadas[Math.floor(Math.random() * camadas.length)];
  const direcaoSorteada = direcoes[Math.floor(Math.random() * direcoes.length)];

  startRotation(eixoSorteado, camadaSorteada, direcaoSorteada);
}

// --- botões ---

const btns = [
  document.getElementById('btn-up'),
  document.getElementById('btn-front'),
  document.getElementById('btn-right'), // Adicionado o botão da Face Direita
  document.getElementById('btn-shuffle') 
];

btns[0].addEventListener('click', () => startRotation('y',  1, -1)); // Cima (Y)
btns[1].addEventListener('click', () => startRotation('z',  1, -1)); // Frente (Z)
btns[2].addEventListener('click', () => startRotation('x',  1, -1)); // Direita (X) - Adicionado
btns[3].addEventListener('click', iniciarEmbaralhamento);

// --- loop de animação ---

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const delta = Math.min(clock.getDelta(), 0.1); 

  if (pivot) {
    const step = Math.min(rotSpeed * delta, ROT_TOTAL - rotDone);
    pivot.rotation[rotAxis] += step * rotDir;
    rotDone += step;

    if (rotDone >= ROT_TOTAL - 0.0001) finishRotation();
  }

  controls.update();
  renderer.render(scene, camera);
}

animate();

// --- responsividade ---
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
